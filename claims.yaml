ts. NAMED TESTS: the l <= 7 rung (one more odd increment pins the convergence character), and the analytic all-orders odd-sector bound -- now unmistakably THE question, since a closed-form cap would settle in one stroke what the ladder can only approach rung by rung. CAVEATS: sampled-LP upper estimates; mean-map residual ~4 percent; the break (+0.10) and the Tsirelson gap (0.45) both exceed tolerances comfortably. [SETTLED CONSTRUCTIVELY: QB-018 exhibits a polynomial conditional CROSSING Tsirelson (CHSH 2.88, edge-exact blend, feasibility verified); the hierarchy converges to 3, the ladder's climb was approximation theory, the order clause is struck, and the isolated question becomes: what selects Tsirelson from the admissible [0,3].]"

