  - id: FND-013
    title: "EM flux tubes ARE unit-quantized defect lines (Derived; the old Open bridge closed): smooth winding is topologically incapable of carrying flux (discrete Stokes: boundary circulation = 2 pi x enclosed winding, exactly), unit quantization is forced at the cell level by bounded bond angles (no plaquette can carry |winding| >= 2; the charge-2 ansatz is read as two adjacent unit cores), multi-quantum tubes are unstable to splitting (same-sign repulsion monotone; far-field energy pi K N^2 ln L to three digits, the quadratic cost that makes flux penetrate as unit lines), and the tube core is FND-014's finite universal 5.448 K object"
    status: Derived
    paper: rope_defect_cores
    benchmark: benchmarks/micromech/flux_tube_quantization.py
    depends_on: [FND-007, FND-008, FND-014, FND-016]
    note: "Originally registered as 'stated open bridge, not claimed; would require settling core singular-vs-smooth' -- one of the corpus's oldest Open items, closed by machinery built after it was registered (the FND-007..016 defect toolkit). THE FOUR LIMBS, bars pre-committed: (B1a) TOPOLOGY -- the discrete Stokes identity holds EXACTLY on arbitrary lattice fields (30 random configurations, error < 1e-9): boundary circulation = 2 pi x net enclosed plaquette winding, so a defect-free smooth field carries ZERO net flux; 'smooth winding' was never a candidate -- flux is necessarily carried by defect lines. (B1b) UNIT QUANTIZATION AT THE CELL LEVEL -- wrapped bond angles are bounded by pi (the same mechanism that makes the core finite, FND-016), so no plaquette can carry winding 2; the coincident charge-2 ansatz theta = 2 phi is immediately read by the lattice as two ADJACENT UNIT CORES: a double-quantum tube does not exist as a lattice object. (B2) SPLITTING ENERGETICALLY DRIVEN, MOTION GATED BY DISCRETENESS -- same-sign pair energy falls monotonically with separation (60.3 -> 42.8 across d = 4..64: tubes repel); under overdamped gradient descent the cores do NOT move (separation preserved exactly at d = 6 and 12 despite the downhill landscape) -- identified as Peierls-Nabarro cell-trapping, the SAME phenomenon FND-KIN-002 measured for kink transport, reappearing unprompted in 2D; encoded as a positive assertion, not hidden. (B3) N-SQUARED FAR FIELD -- the slope of E_N vs ln L equals pi K N^2 to three digits (ratios 4.00 and 9.00 for N = 2, 3; unit slope = pi K per FND-007): the quadratic cost that drives multi-quantum instability and makes flux penetrate as an array of unit tubes -- the type-II structure, derived. (B4) CONSISTENCY -- the unit tube's core energy reproduces FND-014's universal 5.448 K. THE SETTLED ANSWER to the registered question ('core singular-vs-smooth'): the core is neither singular nor smooth-spread -- it is the FINITE, UNIVERSAL, derived object of FND-014/015/016, and the flux it carries is quantized in units with mutual repulsion. Status distribution note: Open 9 -> 8; the oldest foundations bridge is off the open ledger. SESSION NOTE: the initial dynamic-splitting design expected the double core to separate under relaxation; the diagnostic (cores frozen at every initialization while E(d) slopes downhill) identified lattice pinning rather than confinement -- the honest reading strengthens the corpus's cross-sector picture: discrete defects are pinned at the mesh scale and mobile only toward the continuum limit, exactly FND-KIN-002's hierarchy. [INERTIAL FOLLOW-UP: FND-KIN-003 confirms the cell-trapping inertially (narrow GL core arrests, v_late = 0) and shows wide cores transit the corrugation elastically -- the pinning observed here is the narrow-core limit of an exponential mobility hierarchy.] [IDENTITY THROUGH DESTRUCTION: FND-KIN-005 shows the Stokes-protected count survives even pair annihilation to machine precision -- conservation is identity, not prohibition; impenetrability eliminable as an axiom.]"
