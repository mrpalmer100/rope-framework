# ============================================================================
# The Rope Programme — Machine-Readable Claim Registry
# ----------------------------------------------------------------------------
# One canonical, traceable record per principal claim. Every claim carries:
#   id         : stable identifier (SECTOR-NNN)
#   title      : short description
#   status     : Derived | EFT-constrained | Modeled | Conjecture | Failed | Open
#   paper      : the bundled document that states it (docs/<paper>.docx/.pdf)
#   benchmark  : reproducible script that backs it, or null if not code-backed
#   depends_on : claim ids this result rests on (for the dependency graph)
#   note       : honest one-line caveat where relevant
#
# This file is the single source of truth consumed by:
#   tools/verify_corpus.py   (runs benchmarks, checks statuses)
#   tools/build_depgraph.py  (emits the dependency graph)
# ============================================================================

meta:
  programme: "The Rope Hypothesis"
  credit: "Core hypothesis due to Bill Gaede; developed and formalised in this corpus."
  status_vocabulary:
    Derived: "Follows by calculation/proof from stated premises (within cited results)."
    EFT-constrained: "Fixed by effective-field-theory / symmetry reasoning, not first principles."
    Modeled: "Reproduced by an explicit construction consistent with data."
    Conjecture: "Numerically suggestive but conditional or unproven."
    Failed: "Shown not to hold as formulated (kept as a finding)."
    Open: "Not established either way."

