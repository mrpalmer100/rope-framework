    note: "The CHEM-HB-004 registered fix path, executed against its cross-session pre-committed bar (the strongest form: all three in band AND ordering O > F > N AND Schomaker-Stevenson contraction sign right). THE DERIVATION, corpus-native at every step: sharing weights from the bonding eigenvector of the two-level asymmetric Hamiltonian -- the identical coherent-sharing machinery CHEM-DYN-001 derived, applied to unequal wells -- delta = d_eps/sqrt(d_eps^2 + 4t^2); the hopping t computed field-level from two-scale mode profiles (per-element xi from the corpus-frozen table: H 0.443, F 0.64, O 0.66, N 0.71; T calibrated once by the hydrogen 13.6 eV self-energy; NORMALIZED basis, as the eigenvector formula presumes); the well depths eps the declared microscopic per-element input replacing the arbitrary delta(chi) functional: valence-orbital binding energies H 13.60 / N 15.44 / O 17.19 / F 19.86 eV. Downstream, the ENTIRE CHEM-HB-004 construction (completed three-lobe fluorine cone + w = 0.25 A equilibrium-balance contact) reruns with ONLY the charge map swapped; reconstruction fidelity verified first -- the rebuilt pipeline reproduces HB-004's stored 0.438/0.161/0.036 to the third decimal before the swap. VERDICT AGAINST THE REGISTERED BAR: limb (i) all-in-band PASS -- F 0.440, O 0.223, N 0.074, the first time in the entire chain that nitrogen sits inside the band; limb (iii) S-S sign PASS -- the heteronuclear stabilization excess sqrt(t^2+(d_eps/2)^2) - t is positive and monotone in the asymmetry (the contraction mechanism's sign, derived); limb (ii) ordering FAIL -- F 0.440 > O 0.223 persists. BAR FAILED (conjunctive), 2 of 3 limbs, reported straight. WHY THE FAILURE IS THE SESSION'S PRODUCT: the derived route lands fluorine's charge at 0.548 -- numerically COINCIDENT with the Pauling functional's 0.547 -- while simultaneously repairing oxygen to near-exact and lifting nitrogen into the band. Two fully independent constructions (an empirical chi-functional; a mechanism with computed hopping) converging on the same F charge, with the same route fixing everything the diagnosis said was electrostatic, establishes that fluorine's charge is RIGHT and its persistent 2.2x energy overshoot is NOT a charge-map error. After CHEM-HB-002 (map diagnosed), -003 (point-charge flip proven impossible), -004 (contact term insufficient, squared-dipole signature converged), and now -005 (mechanism-derived charges leave F untouched while curing O and N), the F/O inversion is maximally isolated: a genuine short-range closed-shell/overlap-saturation effect at the tight 2.72 A F...F contact -- physics adjacent to the corpus's hbar-fence (the same Pauli-repulsion layer CHEM-MET-001 names), not reachable by any point-charge electrostatics however derived. SESSION CORRECTIONS LOGGED per discipline: (1) the first run used unnormalized mode profiles -- a convention error (the eigenvector formula presumes a normalized basis), caught in-session and fixed on identifiable-a-priori grounds, not outcome-tuned; (2) the fluorine lobe-cone azimuth was recovered by matching HB-004's stored output exactly (reconstruction fidelity; the same azimuth used for both maps, so the comparison is internally consistent). WHAT THE CHAIN NOW HAS: a charge map derived from mechanism rather than adopted, validated three ways (O near-exact, N in band, F route-convergent); the Pauling functional retired as the load-bearing input; and one residual -- the F/O inversion -- carrying the sharpest possible label: beyond-electrostatic, short-range, hbar-adjacent. NAMED NEXT-ORDER, honestly hard: a derived closed-shell contact anisotropy (the F...F approach direction sees three lone-pair lobes, not a uniform sphere) or the genuine Pauli layer -- the latter behind the fence. [NEXT-ORDER EXECUTED, ARC CLOSED: CHEM-HB-006's derived closed-shell anisotropy predicts O to 1.5% and N to 15% with one balance constant, while delivering HALF the anisotropy F needs (3.2 vs ~5.9): the fifth failed ordering bar terminally attributes the F residual to the Pauli/hbar layer.]"

  - id: CHEM-HB-006
    title: "CONTACT ANISOTROPY (Modeled; the registered bar FAILED a FIFTH time -- and the classical arc CLOSES): the derived closed-shell contact anisotropy -- capacity-saturated occupied-mode pairs contribute only the +t^2 penalty, computed field-level over cross-molecule lone-pair and H modes at their frozen orientations with one force-balance coefficient -- is real, correctly directed (penalties F 0.61 >> O 0.19 > N 0.008 eV^2), internally consistent (balance at F or O gives c = 0.52 vs 0.49), and quantitatively validated on the two predicted dimers (oxygen 0.214 vs 0.217 measured, 1.5%; nitrogen 0.110 vs 0.130, the chain's best) -- while delivering HALF the anisotropy fluorine needs (S_F/S_O = 3.2 vs the ~5.9 required): the F residual (0.450 vs 0.199, unchanged through five constructions) is terminally attributed at the classical level to the genuine Pauli repulsion of the dense fluorine shell -- the hbar layer, behind the fence, stated and not simulated"
    status: Modeled
