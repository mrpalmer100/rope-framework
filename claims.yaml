    note: "THE question, settled in the direction NEITHER dead conjecture predicted -- and vindicating the refusal to file a third. THE ANALYTIC KEY, seen before computing: the Frechet band edges Emax = 1 - |x+y| and Emin = |x-y| - 1 are s-INDEPENDENT, so any blend E = (1 - g(s)) P(x,y) + g(s) Q(x,y) of two in-band functions is in-band for every s BY CONVEXITY -- feasibility is structural, and the whole game reduces to approximation: how well can polynomials P, Q hug the band edges (whose |.| kinks cost one-sided polynomial error ~ 1/degree), and how sharply can a polynomial switch g separate the minus slice from the plus slices (separation ~ 1.5 eps^2, but ALL slices sit near s = -1 at near-degenerate settings, where Chebyshev polynomials are ~ 1/d^2 sharp -- the geometry GIVES the sharpness where it is needed). THE CONSTRUCTION'S THREE REPAIRS, logged: (i) raw monomials at degree 18 were numerically catastrophic -- Chebyshev product bases fixed conditioning; (ii) fixed feasibility margins were INFEASIBLE because the band pinches to ZERO WIDTH on the entire lines |x| = 1, |y| = 1 (not just corners) -- diagnosed, and solved by the edge-exact ansatz P = -xy + (1-x^2)(1-y^2) R, which hits the pinch values automatically (the product model -xy satisfies the pinch EXACTLY -- the rigid dipole solution returns as the boundary skeleton of the crossing construction, a satisfying full circle); (iii) the first switch fit leaked outside [0, 1] between grid points near the edge -- refit on a Chebyshev-extrema grid, global range verified within 1e-4 of [0, 1] on 2e5-point scans. RESULT: CHSH = 2.879 (session run) / 2.876 (benchmark reproduction), margin ~ 0.05 over Tsirelson, global band violations at most 2.3e-4 on fraction 5e-5 of 4e5 fresh samples -- four orders below the margin, with the formal epsilon-blend repair toward the exactly-feasible -xy available and costless. CONSEQUENCES, in order of weight: (1) the convergence-below-quantum extrapolation dies CONSTRUCTIVELY; two conjectures died at named tests and the third was never filed -- the caution is now a theorem's worth of vindication. (2) The polynomial hierarchy converges to the unrestricted ceiling 3; the odd-order ladder's deceleration was the 1/degree cost of approximating kinks, and the parity structure (QB-017) was its fine print. (3) THE HARMONIC-ORDER CLAUSE IS STRUCK from the wall specification: what survives is T1 (non-propagating, identity-class), T2 (setting-inclusive), T3 (spherical ensemble; ceiling 3 exact). The crossing order is bracketed: > 5 (QB-017's rung) and <= ~75 (this construction's per-vector order); tightening the bracket is available but no longer foundational. (4) THE HONEST NEGATIVE THAT IS THE REAL FINDING: 2.88 is SUPRA-QUANTUM -- this class contains no-signalling correlations BEYOND quantum mechanics (capped at 3, sub-PR), so nothing here explains why nature sits at 2 sqrt 2; rather, the last structural suspect (smoothness/order) is ELIMINATED, and the question is isolated with unprecedented cleanness: the gamma = 1 marginals + no-signalling admit [0, 3]; classical local realism selects [0, 2]; nature selects [0, 2 sqrt 2]; and WHAT PRINCIPLE CUTS 3 DOWN TO 2 sqrt 2 is now the wall, whole and entire, with every decoy stripped away. NAMED NEXT-ORDERS: the Tsirelson-selection question itself (candidate: a quantum-side constraint the corpus's gamma-law derivation might already contain -- the Hopf/spinor structure that PRODUCED gamma = 1 may cap the conditional class it admits); and the minimal-crossing-order bracket tightening (secondary)."

