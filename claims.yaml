  - id: EM-RECON-001
    title: "Gaede's swinging-threads magnetism reconciles with the corpus curl-vortex B as the same field at two levels; residuals: force-sign rule and E/M-thread ontology"
    status: Modeled
    paper: rope_theory_of_magnetism
    benchmark: benchmarks/em/swinging_threads_reconciliation.py
    depends_on: [EM-007, GG-006]
    note: "Tested whether Gaede's literal 'magnetic field IS whole M-threads physically swinging around the wire' (Science 344, 2015) reconciles with the corpus's B = curl of the helical pitch (a vortex pattern, explicitly 'not ropes swinging as whole objects'). THREE probes: (1) FIELD SHAPE reconciles -- conserved azimuthal swinging-thread flux dilutes as 1/(2 pi r), giving |B|~1/r azimuthal with sign from sweep direction = Ampere/Biot-Savart. (2) The LITERAL RIGID swing is SUPERLUMINAL (tip speed omega*r > c beyond r=c/omega), so it is mechanically impossible and MUST propagate as a swing-WAVE at c -- which IS the corpus curl-of-pitch vortex. So the corpus picture is precisely what Gaede's becomes once made relativistically consistent (same move as screw-current not being rigid lockstep). Gaede (microscopic swing) and corpus (coarse-grained wave/vortex) are ONE picture at two levels, like charge (handedness=linking, GG-006) and current (screw=continuity, EM-014). (3) FORCE SIGN -- RESOLVED (derived, benchmarks/em/force_sign_derivation.py): the sign follows from Gaede's jump-rope rule -- in the GAP between two swinging ropes, opposing swing velocities mesh (attract), aligning velocities clash (repel). For two current wires the swing is the circulation around each wire and the gap lies on OPPOSITE sides of the two circulations, so SAME current -> velocities OPPOSE in the gap -> ATTRACT; OPPOSITE current -> velocities ALIGN -> REPEL. Verified robust across separations and matching the Ampere force law exactly. Independent of rigid-vs-wave propagation; no assumed snag/clash rule. (An earlier claim of a 'wrong sign / named inconsistency' was MY labeling error -- I had mis-equated 'same current' with 'same velocity in the gap'; same-sense circulation gives OPPOSITE gap velocity. Retracted.) SECOND RESIDUAL -- RESOLVED: Gaede's 'E-thread' vs 'M-thread' are NOT two substances but ONE rope seen two ways (his own E&M figure: 'one rope, two phenomena; look ALONG the wire = electricity, look AROUND it = magnetism'). The magnet paper's 'M-thread forks and coils' is that SAME rope branching/coiling (along->around), i.e. Faraday/Ampere coupling drawn pictorially, not a second thread. This is REQUIRED by the corpus's own Maxwell derivation, where E (imbalance along) and B (circulation around) come from one potential structure -- their coupling (Faraday/Ampere) is the fingerprint of one object with two aspects; independent threads would contradict the derived coupling. So the E/M-thread 'ontology gap' was a wording artifact and dissolves. RECOMMENDATION: correct the guide line 'not ropes swinging as whole objects' to 'the swing is real but propagates as a wave, not rigidly'; add the permanent-magnet account at the shared level (aligned spinning atoms sweep the network into circulation, field without transport current); both former residuals now resolved (force sign derived; E/M one-rope). The claim remains Modeled because the swing<->vortex identity is a physical reconciliation rather than a fresh benchmark-derivation, but it no longer carries open residuals. [STATIC SIGN CLOSED (EM-015): the force-sign residual is now fully resolved -- the current/magnetic half by the jump-rope gap rule (force_sign_derivation.py), the static half by the constraint-source superposition theorem. Both derived, neither hardcoded.]"

  - id: EM-RECON-002
    title: "Permanent magnets = aligned atomic rope-swirls summing to a bar circulation (field without transport current); monopole impossibility from thread sweep-direction"
    status: Modeled
    paper: rope_theory_of_magnetism
    benchmark: benchmarks/em/swinging_threads_reconciliation.py
    depends_on: [EM-RECON-001]
    note: "Gaede's permanent-magnet account (Science 344, 2015), reconciled to the corpus level. A permanent magnet has NO transport current; its field comes from many atomic rope-swirls (intrinsic rotation, glossary SPIN entry) ALIGNING in ferromagnetic material so their circulations add into one macroscopic bar-magnet circulation. Same field mechanism as a current coil (aligned rope-rotation sweeping the network), which is why a solenoid acts as a bar magnet. Monopole impossibility follows mechanically: a pole is which way the threads sweep at an end; threads must enter one end and exit the other, so an isolated single pole is impossible (cutting a magnet yields two whole magnets). TWO HONEST RESIDUALS (same as EM-RECON-001, not derived): (1) WHY ferromagnetic domains align and stay aligned is taken as given (as in standard physics), not derived from rope mechanics; (2) the attraction-vs-repulsion sign is now DERIVED (EM-RECON-001). (3) FERROMAGNETIC ALIGNMENT -- MECHANISM IDENTIFIED (benchmarks/em/ferromagnetic_alignment.py, NUC/bond mode-overlap family): the alignment coupling is network MODE-OVERLAP energy (the same family that gives chemical bonds and nuclear binding), NOT the dipole field -- the structural analogue of the quantum exchange interaction. This resolves the HARD part: dipole-dipole between atomic moments is ~1e-6 eV (thousands of times below kT_room, so alignment cannot be dipolar, as in real physics), whereas mode-overlap is bond-strength ~0.1 eV and beats thermal jostling. HONEST LIMITS (not overclaimed): like exchange, whether the coupling gives FERRO (align) or ANTIFERRO (anti-align) is GEOMETRY-DEPENDENT (verified: dipole-type coupling favours anti side-by-side, align head-to-tail; real materials are both, e.g. Fe vs Cr); the rope model does NOT yet compute the sign for a given lattice, the ~0.1 eV magnitude, or why specifically Fe/Co/Ni. This mirrors the state of mainstream first-principles prediction. So: a genuine strong non-dipole MECHANISM at the right scale (the hard part), but guaranteed alignment and material selection are NOT derived. COVERAGE: in both the plain-language guide magnetism chapter (with a permanentmagnet diagram) AND the magnetism paper (Section 11, strict-validated). A faithful mechanical translation of permanent magnetism, not a from-scratch derivation."

  - id: EM-RECON-003
    title: "2D square-lattice swirl-field strain calculator (built + validated): out-of-plane swirls favor ANTIFERRO; ferromagnetism cannot come from the field term alone (see EM-RECON-004 for geometry dependence, EM-RECON-005 for the open mode-overlap problem)"
    status: Derived
    paper: rope_theory_of_magnetism
    benchmark: benchmarks/em/lattice_swirl_strain.py
    depends_on: [EM-RECON-001, EM-RECON-002]
    note: "Built and validated a rope-network strain calculator for a 2D square lattice of swirls (fixed-moment bookkeeping; no co-energy subtlety). VALIDATED before use: single-swirl 1/r field; pair side-by-side ALIGNED costs more than ANTI (the everyday two-magnets-side-by-side-repel fact and textbook dipolar physics); grid integral agrees with the exact pairwise (1/2pi)sum s_i s_j ln(L/d) form. RESULT for the out-of-plane swirl geometry this calculator encodes: robustly favors ANTIFERRO (checkerboard) across 4x4..10x10, both methods; an all-aligned lattice is charged in circulation with a log-divergent far-field cost that the checkerboard neutralizes. SCOPE (see EM-RECON-004): this antiferro result is SPECIFIC to out-of-plane moments; in-plane moments favor FERRO, so the field term is geometry/orientation-dependent, not universal. CORE CONSEQUENCE: the swirl-field term cannot by itself pick out robust ferromagnetism, so real ferromagnetism requires the short-range mode-overlap coupling (EM-RECON-002) to dominate -- the sharp open problem specified in EM-RECON-005 and docs/OPEN_PROBLEM_mode_overlap.md."

  - id: EM-RECON-004
    title: "The lattice field-term ferro/antiferro ordering is GEOMETRY-DEPENDENT (out-of-plane->antiferro, in-plane->ferro); EM-RECON-003's antiferro is not universal"
    status: Derived
    paper: rope_theory_of_magnetism
    benchmark: benchmarks/em/lattice_geometry_dependence.py
    depends_on: [EM-RECON-003]
    note: "Path C stress test of EM-RECON-003. Using true dipole-dipole energy on a 2D square lattice: OUT-of-plane moments favor antiferro (matching the swirl model of EM-RECON-003), IN-plane moments favor FERRO -- the ordering FLIPS with moment orientation. 3D simple-cubic dipoles are near-degenerate (the known dipolar cubic cancellation; verified ~0 to 4 dp across sizes). So the field-term's preference is geometry-dependent, exactly as real dipolar physics is, and EM-RECON-003's antiferro result is specific to the out-of-plane swirl geometry, not a universal statement. This corrects an overstatement of generality in EM-RECON-003 (the calculator was right; the claim's scope was too broad)."

  - id: EM-RECON-005
    title: "PARTIALLY RESOLVED (see EM-RECON-006/007): the mode-overlap functional IS now constructed (quadratic cross-term) and its anchor+scale are derived and its ferro/sigma-pi SIGN computed; the RESIDUAL open piece is narrowed to the repulsive core / saturation steepness, which {T,mu,lambda} do not fix at superposition order (needs one more micro-primitive)"
    status: Modeled
    paper: null
    benchmark: benchmarks/em/mode_overlap_harness.py
    depends_on: [EM-RECON-002, EM-RECON-003, EM-RECON-004]
    note: "Path A prerequisite check. The corpus uses mode-overlap energy qualitatively for chemical bonds (sigma vs pi), nuclear binding, and ferromagnetic alignment, but NEVER as a concrete functional. So the ferro/antiferro sign cannot be computed, only named -- and any invented functional could be tuned to give either sign (unfalsifiable). Deliberately did NOT fake a calculation. Instead specified the target in docs/OPEN_PROBLEM_mode_overlap.md: a functional E_overlap[psi1,psi2] fixed by strand mechanics that (1) reduces to the computed swirl-field term at long range (EM-RECON-003), (2) gives ~0.1 eV at atomic separation without free tuning, (3) follows from network elastic energy with no parameter selecting the sign; plus a VALIDATION HARNESS -- the same functional, untuned, must reproduce the sigma>pi bond ordering (chemistry) and the Fe-56 binding-peak trend (nuclear) as well as the magnetic sign. This is the sharp, checkable open problem and the natural target for a dedicated construction effort (e.g. a focused Fable-5 build) -- with the harness preventing an ungrounded result."

  - id: EM-RECON-006
    title: "Rope mode-overlap functional constructed from network primitives (quadratic cross-term); long-range limit reproduces the field anchor and the ~0.1 eV scale falls out — resolves the core of EM-RECON-005"
    status: Derived
    paper: rope_theory_of_magnetism
    benchmark: benchmarks/em/mode_overlap_harness.py
    depends_on: [EM-RECON-003, EM-RECON-005]
    note: "A dedicated construction effort (separate Fable 5 session) built the mode-overlap coupling specified in EM-RECON-005 / docs/OPEN_PROBLEM_mode_overlap.md; derivation in docs/MODE_OVERLAP_DERIVATION.md, one frozen functional in benchmarks/em/mode_overlap_harness.py. THE FUNCTIONAL: network elastic energy is quadratic in the strand field, so two superposed atomic modes interact EXACTLY via the cross term E_overlap = min_d T INT Re(e^{id} grad psi1* . grad psi2) + T INT b1.b2 -- no coefficient or sign chosen. INDEPENDENTLY VERIFIED HERE (ran the harness + adversarial probes): (1a) 2D long-range slope -6.20 vs -2pi and (1b) 3D dipole-tensor correlation +0.997 -- the far field IS the EM-RECON-003 anchor, not merely consistent. (2) With T fixed ONCE by the 13.6 eV one-atom self-energy, E_overlap(2.5A, head-on) = -0.27 eV falls out as a ratio of computed integrals -- the exchange/bond scale the dipole picture missed by 5 orders of magnitude; nothing inserted at 0.1 eV. These two (anchor + scale) are the solidly DERIVED core and I could not poke holes in them. [NEXT FRONTIER (CHEM-GEO-001, Open): this derived functional is the designated machinery for the molecular-geometry programme -- heteronuclear extension of the cross-term, then angular overlap around multivalent knots, with pre-committed bars (bent-vs-linear discrimination; heteronuclear bond lengths). A reviewer's ansatz implementation was refused in favor of extending this derivation.]"

  - id: EM-RECON-007
