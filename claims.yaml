  - id: PM-005
    title: "Scope statement: the rope programme is a theory of ORDINARY MATTER (first generation + composites + photon); it derives mass STRUCTURE (massless photon, nuclear composition rule, mass=mode-energy) with a few absolute mass units as inputs, and claims NOTHING on generation-2/3 masses"
    status: Derived
