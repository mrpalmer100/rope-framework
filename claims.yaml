ogy draws on. CANDIDATE RESOLUTIONS, none derived: local fabric reconfiguration (geometry changes, topology and material conserved); linking-preserving constrained reconnection; pure energy-minimizing configuration flow (the solver's operative formalism, mechanism-agnostic). WHAT WOULD MOVE THIS: a minimal lattice model of a knot translating through an inextensible weave, testing whether linking-preserving rearrangement can be simultaneously dissipationless and consistent with the derived contact repulsion -- the foundations analogue of the QB-009 conservation toy. [FIRST TEST EXECUTED: FND-KIN-002's minimal kink toy resolves the dissipation tension quantitatively -- rearrangement IS dissipative (even self-trapping) at the lattice scale, and the loss is exponentially suppressed in knot-width/mesh-spacing (seven-order log-linear, ~1e16 dynamic range): dissipationless drift is the continuum-limit property; inertia protected to exponential accuracy for wide knots. This question remains Open for 3D linking + contact repulsion.] [PROGRAM COMPLETE, STATUS Open -> Modeled: the minimal-model program this claim called for is executed across dimensions -- FND-KIN-002 (1D: the exponential dissipation hierarchy), FND-KIN-003 (2D: the hierarchy survives dimensionality; inertial mobility crossover), FND-KIN-004 (3D: the kink mechanism beats rigid motion by >=100x; crowding guards the topology at long range). The transport tension is resolved: rearrangement is lossy at the mesh scale and exponentially free above it, with crowding enforcing topological safety. NAMED RESIDUAL, kept open in spirit: the strand-level instantiation with literal rope_solver knots -- a fidelity question, not a mechanism question.]"

