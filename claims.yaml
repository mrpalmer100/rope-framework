    note: "The CHEM-HB-005 registered next-order, run with bars pre-committed and both outcomes registrable (crown the arc or seal the attribution). THE MECHANISM, corpus-native with nothing invented: closed shells meeting at a contact are capacity-saturated -- the sharing channel is blocked by the SAME capacity rule that runs the nuclear sector and CHEM-DYN, leaving only the +t^2 repulsive piece -- so the anisotropic contact energy is Sum t_ij^2 over cross-molecule OCCUPIED-mode pairs: each heavy atom's lone-pair modes at their frozen cone orientations (the HB-003/005 geometry) plus each H mode along its bond, with the hopping computed field-level from two-scale ORIENTED profiles (frozen xi table; normalized basis; T calibrated once by the hydrogen 13.6 eV self-energy). The anisotropy is automatic, not imposed: fluorine's three lobes point into a 2.72 A contact that sits 0.22 A INSIDE mutual vdW radii, oxygen's two lobes into a marginal 2.98 A contact, ammonia's single lobe across a roomy 3.26 A. ONE coefficient c on the penalty -- its overall scale being exactly the CORE-CONDITIONAL element the harness declared unresolved at superposition order -- fixed by force balance at the F dimer's own measured separation (the identical equilibrium principle that produced HB-004's w = 0.25); oxygen and nitrogen are then PURE PREDICTIONS. RESULTS: (B1) the computed penalty ordering is F 0.61 >> O 0.19 > N 0.008 eV^2 -- the anisotropy targets fluorine hardest, exactly as the four-failure diagnosis predicted. (B2) c = 0.514 /eV, and the balance principle is internally consistent: fixing c at the OXYGEN dimer instead gives 0.49 with identical conclusions -- a nontrivial validation of the closed-shell term itself. The predictions: OXYGEN 0.214 vs 0.217 measured -- 1.5 percent; NITROGEN 0.110 vs 0.130 -- 15 percent, the best nitrogen result of the entire chain; FLUORINE 0.450 vs 0.199 -- the same 2.3x, essentially unmoved through five distinct constructions. All three in band; the ORDERING limb fails for the FIFTH consecutive time. (B3) THE FAILURE QUANTIFIED, the session's sharpest number: closing fluorine while preserving oxygen requires a penalty ratio S_F/S_O of at least ~5.9; the computed classical mode-overlap anisotropy delivers 3.2 -- real, correctly directed, and HALF the required strength. TERMINAL ATTRIBUTION: the arc has now applied, in order, the charge-map diagnosis (HB-002), the point-charge impossibility theorem (HB-003), the isotropic equilibrium-balance contact (HB-004), mechanism-derived charges with route convergence at F (HB-005), and the derived anisotropic closed-shell contact (HB-006) -- every classical layer the corpus possesses. Each construction improved O and N; none moved F. The F/O inversion therefore requires the genuine Pauli repulsion of fluorine's dense closed shell -- steeper and stronger than any density-overlap t^2 can classically supply -- which is hbar-layer physics (the exchange piece of the same fence FND-BOUND-001 names). Stated as the arc's terminal classical result, not simulated around. WHAT THE CHAIN DELIVERS AS IT CLOSES: a hydrogen-bonding model with derived charges, derived lobes, and a derived anisotropic contact that predicts water's dimer to 1.5 percent and ammonia's to 15 percent with one balance-fixed constant -- and one residual, fluorine, carrying the most precisely measured attribution in the corpus: classical anisotropy delivers factor 3.2 of the required 5.9, and the remainder is the fence's."

  - id: NUC-001
    title: "Atomic masses reproduced to <0.1% from nucleon-knot count minus rope-mode-overlap binding (given measured binding energies)"
    status: Derived
    paper: rope_nuclear_physics
    benchmark: benchmarks/em/atomic_mass_from_nucleons.py
    depends_on: [FND-008]
    note: "Resolves an earlier wrong conclusion (that mass-from-windings fails because the neutron has zero net winding). The nuclear paper models the neutron as a COMPLETE knot (udd; zero NET winding but full nucleon mass), so the mass-bearing rope quantity is the nucleon-knot count A=protons+neutrons, NOT the net winding (charge) Z. Atomic mass = sum of constituent-knot masses minus binding energy (identified as rope mode overlap, peaking at Fe-56). Verified: this reproduces real atomic masses to <0.1% (H,He,Li,C,O,Fe,U), while the naive mass~charge(Z) FAILS by ~2.6x (blind to neutrons). HONEST SCOPE: binding energies are MEASURED INPUTS; the paper identifies binding=rope-mode-overlap and explains the Fe-56 peak qualitatively but does NOT yet derive the binding curve from rope parameters (its own open problem). So this is reproduction-given-binding + a mechanism story, not a from-scratch prediction. The 'bare A ~ amu' part is near-tautological; the value added is the binding-deficit correction and its mechanical picture. [UPGRADE (NUC-005): binding energies are now PREDICTED from structure with ONE calibrated constant (bond counting + geometric surface + derived Coulomb), rather than taken as measured inputs -- masses C-12..U-238 within 0.15%, declared quantum omissions accounting for 80-86% of the heavy residuals.]"

  - id: NUC-002
    title: "Strong nuclear force identified as rope-bundle contact force at nuclear scale (atomic contact physics scaled by ~1e5)"
    status: Conjecture
    paper: rope_nuclear_physics
    benchmark: null
    depends_on: [NUC-001]
    note: "The paper's central proposal: the strong force IS the rope-bundle contact force that creates chemical contact at atomic scales (1e-10 m, eV), operating at nuclear scale (1e-15 m, MeV) -- 1e5x smaller, correspondingly greater energy. Quark confinement follows from fractional sub-knots being unstable alone (see NUC-003). QUALITATIVE identification with a scaling story; the paper lists the quantitative Yukawa potential from rope bundles as an OPEN problem. Not derived; a mechanism hypothesis. Registered as Conjecture. [UPDATE: NUC-004 upgrades this -- the Yukawa FORM is now derived exactly from the mode-overlap mechanism (Green's function of the screened mode equation); only the absolute range remains input, tracing to the EM-RECON-008 super-quadratic coefficient. The 'quantitative Yukawa from rope bundles' open problem is resolved at the level of FORM.]"

  - id: NUC-003
    title: "Fractional quark sub-knots are CONSISTENT with integer charge quantization (confined, sum to integers) but require an UNBUILT sub-integer topological layer"
    status: Open
    paper: rope_nuclear_physics
    benchmark: null
    depends_on: [GG-006, EM-001, FND-008]
    note: "CONSISTENCY CHECK run before adopting the nuclear paper. The paper models quarks as sub-knots with fractional winding (+2/3,-1/3). SURFACE conflict with the corpus's integer charge quantization (FND-008, EM-001, GG-006, all Derived). RESOLUTION (passes): the fractional pieces are CONFINED (unstable alone) and only exist bound into configurations whose TOTAL winding is integer -- verified arithmetically (proton uud=+1, neutron udd=0, pi+=+1, Delta++=+2). So all OBSERVABLE charges remain integer; the corpus's observable-level claims are UNVIOLATED (same confinement logic real physics uses). HONEST GAP (why Open, not Derived): GG-006 defines charge as an integer IDENTICAL to the linking number, and the linking/Chern math (GG-002/003) is intrinsically integer-valued; a 2/3 winding is NOT a standard linking number -- the paper itself says these fractions 'require a more general topological classification than integer knots alone'. So the sub-knot layer is a NEW topological framework the corpus has NOT built, not a consequence of existing integer-linking machinery. Consistent at the observable level; the fractional-winding ontology is a flagged unbuilt dependency."

  - id: NUC-004
    title: "The strong-force YUKAWA FORM exp(-r/L)/r is derived exactly from the rope mode-overlap mechanism (same as chemical binding); short range derived; only the absolute range L is input, tracing to the EM-RECON-008 super-quadratic coefficient"
    status: Modeled
    paper: rope_nuclear_physics
    benchmark: benchmarks/em/yukawa_from_mode_overlap.py
    depends_on: [NUC-002, EM-RECON-006, EM-RECON-008]
    note: "Scoped whether NUC-002's open problem (the quantitative Yukawa potential from rope bundles) is attackable. RESULT: the Yukawa FORM is derived EXACTLY, upgrading NUC-002 from a qualitative scaling story. The Yukawa potential V(r)=-g^2 exp(-r/L)/r is the 3D Green's function of the screened/massive wave equation (-nabla^2 + 1/L^2)V=delta (verified numerically: exp(-r/L)/r solves it exactly away from the origin). A rope mode with a restoring/confining term (a mass term 1/xi^2) obeys exactly this equation, so its overlap force IS Yukawa -- the exp(-r/xi)/r form and the FINITE RANGE fall out, not assumed. This is the SAME mode-overlap mechanism as chemical binding (EM-RECON-006), now at nuclear scale, giving NUC-002's '1e5 scaling' a concrete form. DERIVED: the Yukawa functional form; the short-rangedness (force ~0 beyond a few fm, unlike infinite-range 1/r^2 EM -- a mass term gives finite range). INPUT: the absolute range L~1.4 fm, which needs the restoring-term strength (the mode 'mass' 1/L^2) = the nonlinear/confining part of the network energy = EXACTLY the super-quadratic coefficient EM-RECON-008 showed is not fixed by {T,mu,lambda}. So the range traces to a KNOWN open piece, not a new gap -- and the same coefficient now governs bond length, nuclear spacing, ferro magnitude (EM-RECON-008) AND the strong-force range, tightening the unification. HONEST: registered Modeled, not Derived, because the derivation is conditional on the network providing a restoring/mass term for nuclear modes (which is the EM-RECON-008 coefficient, assumed nonzero but not computed). The FORM is exact given that; the SCALE is the open coefficient. Removes 'quantitative Yukawa from rope bundles' from the nuclear paper's open-problems list at the level of FORM."

  - id: NUC-005
    title: "Atomic masses PREDICTED across the table (C-12 to U-238 at 0.01-0.11%) with ONE calibrated nuclear constant: bond counting from mode overlap, surface term derived from geometry (a_S/a_V = 1.108 vs 1.130 empirical, parameter-free), Coulomb from derived charge and spacing; quantum omissions declared and their residuals verified"
    status: Modeled
    paper: rope_nuclear_physics
    benchmark: benchmarks/em/atomic_mass_predictor.py
    depends_on: [NUC-001, NUC-004, EM-RECON-009, EM-RECON-013, PM-005]
    note: "Mark asked: can we NOW calculate the mass of hydrogen, helium, etc.? Answer: yes, in a meaningfully stronger sense than NUC-001 -- which reproduced masses <0.1% but took ALL binding energies as measured inputs. This claim PREDICTS bindings from structure with exactly ONE calibrated constant. CONSTRUCTION (each piece traced): (1) bond counting -- nucleons bind pairwise by mode overlap (NUC-004 Yukawa form + EM-RECON-009 core) at spacing d0~1.9 fm, close-packed z=12, bulk binding 6*eps per nucleon; eps is THE one calibrated constant (the absolute nuclear scale that always remained), fixed once on Ca-40 -> a_V = 16.21 MeV (empirical 15.75), eps = 2.70 MeV. (2) SURFACE term derived from close-packing geometry with ZERO parameters: a_S/a_V = 1.108 predicted vs 1.130 empirical -- 2%. (3) COULOMB term derived (charge = winding GG-006; spacing derived): a_C = 0.823 MeV vs 0.711 empirical (16%; classical uniform sphere). (4) OMISSIONS DECLARED IN ADVANCE: asymmetry and pairing need Fermi statistics (hbar -- quantum boundary, out of scope); predicted consequence: heavy N>Z nuclei overbound by ~23(A-2Z)^2/A. RESULTS: masses C-12/O-16/Fe-56/Pb-208/U-238 within 0.15% (Fe-56: 0.014%); binding energies 1.5-2.5% for N~Z A>=12, degrading to 10-14% for heavy nuclei where the RESIDUAL AUDIT shows 80-86% of the overbinding is exactly the declared quantum omission -- the classical part is doing its job. CROSS-CHECK: eps = 2.70 MeV > deuteron 2.22 MeV (a classical bond depth must exceed the quantum-zero-point-reduced deuteron; correct direction). HONEST BOUNDARIES, stated for the two nuclei Mark named: H-1 is inputs only (m_p + m_e; its 13.6 eV electronic binding is the EM-RECON-006 calibration input -- circular by construction); He-4 FAILS at 38% binding error and is DECLARED a classical-drop failure -- the smallest nuclei are quantum-dominated (alpha clustering, zero-point motion), so the capability is strongest mid-table and the named lightest cases are honestly its worst. Registered Modeled: real predictive structure with one calibrated scale, O(1) geometric modeling choices (z=12, 3 missing surface bonds, uniform sphere), and quantum-sector omissions that bound the achievable accuracy until the QB sector opens."

  - id: NUC-006
    title: "SEMF VOLUME/SURFACE FROM BUNDLE-CONTACT GEOMETRY (Modeled; PARTIAL -- volume+surface DERIVED, surface/volume ratio and alpha-preference MISSED and registered): a close-packed droplet of NUC-004 contact-bonded knots gives B/N linear in N^(-1/3) (the SEMF's two leading terms as saturation geometry, R^2 = 0.96), but the surface/volume ratio comes out 2.05 vs empirical 1.16, and the raw contact sum shows NO alpha-particle peak -- the pre-stated tetrahedral-closure mechanism was refuted by computation"
    status: Modeled
    paper: rope_nuclear_physics
    benchmark: benchmarks/em/nuclear_binding_geometry.py
    depends_on: [NUC-004, NUC-005, EM-015]
    note: "First nuclear-sector session on binding STRUCTURE (vs NUC-005's mass predictor), run with bars declared before computation and reported straight -- 1 of 4 met on the headline physics, the two failures being the informative part. THE MODEL: extend NUC-004's exact bundle-contact Yukawa -- a nucleus is N knots close-packed at contact separation ~lambda, binding = summed contact bonds; a short-range bond SATURATES (each knot bonds only near neighbors), the same saturation axis as the metallic band inverted by short range, and saturation IS the volume term. BAR (a) PASS: the droplet's B/N is linear in N^(-1/3) across N = 13..459 (R^2 = 0.96) -- bulk saturation minus a surface deficit, the SEMF volume and surface terms emerging from contact geometry rather than fitted. BAR (b) FAIL, registered: the surface/volume ratio is 2.05 vs the empirical a_S/a_V = 1.16 (~1.8x high) -- a structureless contact droplet over-weights its surface; no knob applied. BAR (c) FAIL, and it FALSIFIES THE PRE-STATED MECHANISM (the session's most important result): the derivation predicted A=4 as a local B/A maximum via tetrahedral contact closure, and the computation REFUTED it -- raw contact B/A rises monotonically (0.35, 0.70, 1.05, 1.24, 1.48) with no alpha peak, because a pure geometric contact sum has no shell structure and cannot know A=4 closes one. The tetrahedral-closure claim is withdrawn; the miss is on the books, NOT tuned into a peak by a coordination cutoff. BAR (d) LABELS honest: the Coulomb term is EM-015-derived (like windings repel, +Z^2/r), added for real nuclei; He-4 absolute binding remains the declared NUC-005 quantum failure; pairing and asymmetry terms remain quantum. SHARED DIAGNOSIS: (b) and (c) have ONE root cause -- the raw contact sum omits the mode-capacity quantization that NUC-004's mechanism actually carries (the 2-kink/mode structure that would supply both a surface-tension calibration and shell closure); a structureless droplet was always going to miss surface tension and shells. REGISTERED NEXT-ORDER: rebuild the droplet with mode-capacity-quantized bonds (not a raw geometric sum) and test whether the surface ratio corrects AND an A=4/shell structure emerges together -- one derivation, both misses, its own pre-committed bar. Credibility: the nuclear sector's first structure session establishes volume/surface honestly and registers two clean misses with a shared cause -- the chemistry-sector pattern (derive what derives, register what misses, diagnose the root) transplanted intact. [REBUILD EXECUTED: NUC-007's mode-capacity quantization resolves the surface/volume miss (2.05 -> 1.17 vs empirical 1.16), REINSTATES the withdrawn alpha-peak claim in its defensible core (A=4 peak + A=5 instability, analytic), captures magic numbers 2/8/20 with the spin-orbit gap declared, and registers the residual miss: alpha-multiple periodicity, diagnosed as state-blind capacity.]"

