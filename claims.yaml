0 measured; unrestricted (all orders / nonpolynomial): 3 exact. The specification's fifth clause sharpens to l >= 3 or nonpolynomial setting dependence -- and the B-PINNING CONJECTURE this measurement motivates would be decisive if proven: if the linear coefficient is pinned at -1/3 at every finite polynomial order, then NO smooth conditional of any order reaches quantum correlations through the only channel that matters, and the supplier of the nonlocal conditional is NONPOLYNOMIAL in the settings outright -- sign-type or distributional, which dovetails with T1's identity-class characterization (identities ARE discontinuous counting objects, not smooth response functions). The wall's specification would then read: a non-propagating, setting-inclusive, spherical-ensemble, nonpolynomial counting object under ceiling 3. NAMED NEXT-ORDER: prove or refute the B-pinning conjecture at l <= 3 (one more rung decides the trend), or attack the all-orders forcing argument directly. [CONJECTURE REFUTED at the named next rung: QB-015's cubic class frees B to -1.01 and crosses classical (CHSH ~2.27-2.28, odd sector only, density-stable); the ladder brackets classical between rungs 2-3 and Tsirelson between rung 3 and the top -- the clause updates to l >= 4 or nonpolynomial.]"

