    note: "The frozen functional's sign results, with independent scrutiny applied. CHEM: |A_sigma| > |A_pi| at all r (ratio ~4 at 2.4A) -- a GENUINE computation (gradient-field interleaving, not a trivial identity), but PROFILE-DEPENDENT (rests on the w*exp(-rho) mode ansatz the doc declares in Sec 2/7). MAGNETISM: aligned senses phase-lock (coherence robust ~1.0) while anti-aligned frustrate; ferro favored. SCRUTINY (Claude, this session): the pristine claim 'antiferro coherence exactly 0.000 / full-bond-energy win' is a bcc-SYMMETRY IDEALIZATION -- coherence jumps to 0.1-0.3 under small lattice jitter. BUT the physically meaningful ENERGY GAP (E_af - E_ferro) is ROBUST: it retains ~91% of its pristine value under combined realistic positional (~0.05-0.07A RMS) AND spin-axis disorder (new permanent check3c_disorder_robustness). So ferro is a REAL, softened preference -- the sign is genuinely derived -- but the headline magnitude ('vs exactly zero') was overstated. Registered Modeled (not Derived) because sigma>pi is profile-dependent and the ferro magnitude rests on the same profile ansatz; the SIGN/order is the robust part. Correction to my own first probe: coherence was the wrong observable (fragile); the energy gap is the right one (robust)."

