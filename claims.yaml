  - id: PM-003
    title: "The NUC-001 mass mechanism (knot-count minus binding) provably does NOT extend to leptons; the lepton mass problem is structurally reclassified as a 3-level knot EXCITATION spectrum, not composite counting"
    status: Derived
    paper: null
    benchmark: benchmarks/em/lepton_mass_structural.py
    depends_on: [NUC-001, PM-001]
    note: "Option-A investigation: does the WORKING nuclear mass mechanism (NUC-001, Derived: atomic mass = knot-count A minus mode-overlap binding) extend to leptons? RESULT: provably NO, with a structural reason. NUC-001 works because nuclei are COMPOSITE -- mass tracks a COUNT of internal knots (A=2..238) and winding/charge scales with structure. All three charged leptons (e, mu, tau) share winding number 1 (same charge -1, same spin 1/2); they differ ONLY in mass. So (1) if generations differed by knot COUNT N, they would have winding ~N (charge ~N) -- they do not, REFUTING knot-counting; and (2) equal winding => equal 'A' => NUC-001 predicts the SAME mass for all three, but masses differ up to 3477x. So NUC-001's mechanism cannot produce lepton ratios. POSITIVE RECLASSIFICATION (the value): the generation label is therefore an EXCITATION quantum number of ONE knot (three energy levels), not a count of sub-knots -- a knot excitation-spectrum problem. This explains WHY the Koide-phase relation (PM-001, a relation AMONG levels) is the relevant kind of tool and why knot-counting was never going to work, and it replaces the vague 'masses underived' with a well-posed problem: a knot excitation spectrum with exactly 3 bound levels in the observed ratios. HONEST NEGATIVE: this does NOT derive lepton masses; the ratios match no simple ladder (sqrt-levels 1,14.4,59 non-integer; log-levels 0,5.33,8.15 unequal; successive 207,16.8 non-geometric), so lepton masses remain irreducible inputs pending a computed excitation spectrum. Registered Derived because the NON-extension and reclassification are proven structural facts (not the masses themselves)."

