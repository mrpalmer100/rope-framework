    depends_on: [NUC-001, PM-003, PM-004]
    note: "A scope clarification (Mark's steer), drawn on PRINCIPLE not convenience. 'Ordinary matter' = everything needed to build stable atoms, molecules, and bulk matter plus their interactions -- which is EXACTLY the first generation (electron, up, down) + composites (proton, neutron, nuclei, atoms) + the photon. Everything the model DERIVES lives here; everything it cannot derive (gen-2/3 masses) lives outside. RIGOR CHECK (prevented an overclaim): the model does NOT derive absolute ordinary-matter mass VALUES either -- what it derives is mass STRUCTURE: (a) the photon is massless (a genuine prediction: a network wave carries no rope mode energy); (b) mass = rope mode energy (ontology; charge = winding is a SEPARATE quantity, GG-006); (c) nuclear masses to <0.1% via the composition rule (NUC-001) GIVEN the nucleon mass unit and binding energies as inputs. INPUTS (irreducible absolute scales, like the mesh scale a, FND-MATTER-005): the nucleon mass unit and the electron mass. OUT OF SCOPE: muon, tau, heavy quarks, W/Z/Higgs -- real particles not needed to build ordinary matter; the muon ('who ordered that?') is the canonical not-needed particle. SIGNIFICANCE: this reframes PM-003/PM-004 not as failures but as a scope boundary -- the programme is strong (derived) on first-generation ordinary matter and its interactions and explicitly claims nothing on heavier generations, rather than owing and failing to derive them. A theory of ordinary matter need not derive the muon mass any more than a theory of chemistry owes the top quark. Registered Derived: the scope boundary (ordinary matter = gen-1) and the derived/input/out-of-scope classification are coherent structural facts."

  - id: FND-MATTER-001
    title: "REFRAMED via Gaede's atom: atomic size is a standing-wave WAVELENGTH (decoupled from mesh spacing), so the mesh->atom hierarchy worry DISSOLVES; the residual is the general (not special) problem of deriving m_e, hbar -> Bohr radius"
    status: Open
    paper: rope_microscopic_mechanics
    benchmark: null
    depends_on: [FND-REL-003]
    note: "Consequence of FND-REL-003 (mesh spacing a << 1e-16 m, far finer than atomic ~1e-10 m). READING A ('atom = single rope-endpoint node', which would make rope spacing = interatomic spacing) is REFUTED -- that scale is Lorentz-excluded. The corpus's endpoint-locking result J=T^2/kappa is a COARSE-GRAINED homogenization, so 'endpoint' is an effective node, consistent with READING B ('atom = extended composite/topological structure spanning ~1e6 mesh cells, size ~1e-10 m; atoms are coarse defects in a finer mesh, like a vortex spanning many underlying particles'). Reading B is the only SURVIVABLE option and is consistent with the corpus, but is a RECONCILING HYPOTHESIS, NOT a derived result. Three genuine gaps: (1) the scale hierarchy (~1e6+ from mesh to atomic) is not derived -- the one dimensionless coupling Pi=kappa a/T is a free parameter 'fixable only by a deeper theory'; (2) no model of an atom as a bound rope structure of the right size; (3) no reproduction of actual atomic physics (spectra, chemistry) from such structures. PARTIAL NARROWING (constructive probe, not a solution): the corpus's defect energy is LOGARITHMIC (E~piK ln(R/a)), the structure behind dimensional transmutation -- inverting a log gives R~a exp(binding/piK), an exponentially large size from an O(1) coupling (as QCD does). So the framework is NOT structurally incapable of a mesh->atom hierarchy. HONEST CAVEAT: exp(binding/piK) for reasonable inputs gives ratios ~10-1000, NOT 1e6 automatically; reaching the atomic scale still needs the coupling/binding in a specific range. Gaps remain: hierarchy not computed, no bound-atom model of the right size, no atomic physics (spectra, chemistry) reproduced. Arguably the framework's biggest conceptual debt, EXPOSED (not created) by the Lorentz result. Logged honestly; not resolved. GAEDE REFRAMING (Mark's steer; Gaede's atomic model, recorded as his ontology not corpus-derived): in Gaede's picture an atom is a hub-knot with ropes radiating off to other atoms, and the electron shells are STANDING TORSION patterns on the near-hub ropes. The atomic size ~1e-10 m is the WAVELENGTH of that standing pattern, NOT a multiple of the mesh spacing -- exactly as a guitar-string wave's wavelength (cm) is unrelated to the string's molecular spacing (nm). So mesh-scale and atomic-scale are INDEPENDENT and the ~1e6 'hierarchy' was a mis-framing: there is nothing to derive between them. The corpus's chemistry paper already uses this standing-wave-around-a-knot picture, so it is internally consistent. NET: the special hierarchy debt DISSOLVES; what remains is the GENERAL open problem (shared by all sectors) of deriving m_e and hbar, which then fix the Bohr radius a0=hbar^2/(m_e e^2) as the standing-wave scale. Downgraded from 'biggest special conceptual debt' to 'the general constant-derivation problem'. Still open, but not a unique matter-sector crisis. GAEDE IMAGE (viewed directly, 'Introducing The Atom' + '2D/3D EM rope torsions', https://www.youtube.com/watch?v=Y5MVggLmzV4): the picture shows an atom/proton as a CONVERGENCE of very many ropes to a focal core inside a woven circumferential shell, with ropes continuing outward -- a many-rope 'star', NOT a few-rope knot (correcting an earlier vague 'hub-knot' description). Light/EM is drawn as a two-strand TORSION travelling along a rope connecting two atoms point-to-point ('EM rope torsions'), which matches the corpus EM sector (transverse two-strand wave; screw/torsion current EM-014). The many converging ropes are naturally the flux lines of the charge source (consistent with the Gauss-law/charge-as-rope-count structure), and rope=atom-pair connection matches endpoint-locking. These are CONCEPTUAL renders, not quantitative: they confirm and sharpen the ontology (atom = coarse convergence pattern on a fine sub-nuclear rope mesh, consistent with atomic-scale != mesh-scale) but derive nothing new -- the rope number N and the atomic scale (Bohr radius) still require m_e, hbar. Net: ontology strengthened, open residual unchanged."

  - id: FND-MATTER-002
