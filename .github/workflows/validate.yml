name: validate

on: [push, pull_request]

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .
      - name: Heartbeat 1 -- validation (expect 10/10)
        run: python validation/run_validation.py
      - name: Heartbeat 2 -- physics + EM regression (expect 24/24)
        run: python validation/run_physics_validation.py
      - name: Heartbeat 3 -- reproduction (expect 6/6)
        run: python benchmarks/reproduce_results.py
      - name: Benchmark catalogue
        run: python -c "from rope_solver.benchmark_catalogue import print_catalogue; print_catalogue()"
