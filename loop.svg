<svg xmlns="http://www.w3.org/2000/svg" width="600" height="320" viewBox="0 0 600 320" font-family="Georgia, serif"><defs><marker id="aw" markerWidth="11" markerHeight="11" refX="8" refY="3.5" orient="auto"><path d="M0,0 L9,3.5 L0,7 Z" fill="#B5651D"/></marker></defs><rect width="600" height="320" fill="#FCFBF8"/><text x="300" y="36" font-size="20" fill="#1B3A5C" text-anchor="middle" font-weight="bold">Why current needs a closed loop</text><text x="300" y="58" font-size="13" fill="#666666" text-anchor="middle" font-weight="normal">wraps must enter at one end and leave at the other — or the rope winds up</text><rect x="140" y="110" width="320" height="140" rx="10" fill="none" stroke="#1B3A5C" stroke-width="3"/><line x1="140" y1="170" x2="140" y2="185" stroke="#FCFBF8" stroke-width="6"/><line x1="131" y1="168" x2="149" y2="168" stroke="#7B2D26" stroke-width="3"/><line x1="135" y1="187" x2="145" y2="187" stroke="#7B2D26" stroke-width="5"/><text x="124" y="180" font-size="11" fill="#7B2D26" text-anchor="end" font-weight="normal">battery</text><text x="124" y="196" font-size="11" fill="#7B2D26" text-anchor="end" font-weight="normal">(twist pump)</text><line x1="210" y1="110" x2="390" y2="110" stroke="#B5651D" stroke-width="2.5" marker-end="url(#aw)"/><line x1="460" y1="160" x2="460" y2="200" stroke="#B5651D" stroke-width="2.5" marker-end="url(#aw)"/><line x1="390" y1="250" x2="210" y2="250" stroke="#B5651D" stroke-width="2.5" marker-end="url(#aw)"/><text x="300" y="102" font-size="11" fill="#B5651D" text-anchor="middle" font-weight="normal">wraps stream out (+)</text><text x="300" y="268" font-size="11" fill="#B5651D" text-anchor="middle" font-weight="normal">wraps return (−)</text><text x="472" y="180" font-size="11" fill="#1B3A5C" text-anchor="start" font-weight="normal">lamp / load</text><text x="300" y="290" font-size="12" fill="#666666" text-anchor="middle" font-weight="normal" font-style="italic">The battery supplies wraps at one terminal and takes them back at the other.</text><text x="300" y="306" font-size="12" fill="#666666" text-anchor="middle" font-weight="normal" font-style="italic">No loop = nowhere for wraps to go = no steady current. This is charge conservation.</text></svg>