nse rope bundles overlap they push and grip hugely — short range (they either</text><text x="300" y="308" font-size="11" fill="#666666" text-anchor="middle" font-weight="normal" font-style="italic">touch or don't), charge-blind, with a hard core. Mechanism shown; the exact strength isn't yet derived.</text></svg>