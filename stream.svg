<svg xmlns="http://www.w3.org/2000/svg" width="600" height="320" viewBox="0 0 600 320" font-family="Georgia, serif"><defs><marker id="aw" markerWidth="11" markerHeight="11" refX="8" refY="3.5" orient="auto"><path d="M0,0 L9,3.5 L0,7 Z" fill="#B5651D"/></marker><marker id="at" markerWidth="11" markerHeight="11" refX="8" refY="3.5" orient="auto"><path d="M0,0 L9,3.5 L0,7 Z" fill="#1F5C5C"/></marker><marker id="ag" markerWidth="11" markerHeight="11" refX="8" refY="3.5" orient="auto"><path d="M0,0 L9,3.5 L0,7 Z" fill="#666666"/></marker></defs><rect width="600" height="320" fill="#FCFBF8"/><text x="300" y="36" font-size="20" fill="#1B3A5C" text-anchor="middle" font-weight="bold">Current — the braid streams down the wire</text><text x="300" y="58" font-size="13" fill="#666666" text-anchor="middle" font-weight="normal">each bit of rope rotates in place; the pattern travels, the material stays</text><rect x="80" y="110" width="440" height="60" rx="8" fill="#D6E4F0" stroke="#1B3A5C" stroke-width="2"/><line x1="14" y1="170" x2="44" y2="110" stroke="#B5651D" stroke-width="4" opacity="0.8"/><line x1="36" y1="170" x2="66" y2="110" stroke="#B5651D" stroke-width="4" opacity="0.8"/><line x1="58" y1="170" x2="88" y2="110" stroke="#B5651D" stroke-width="4" opacity="0.8"/><line x1="80" y1="170" x2="110" y2="110" stroke="#B5651D" stroke-width="4" opacity="0.8"/><line x1="102" y1="170" x2="132" y2="110" stroke="#B5651D" stroke-width="4" opacity="0.8"/><line x1="124" y1="170" x2="154" y2="110" stroke="#B5651D" stroke-width="4" opacity="0.8"/><line x1="146" y1="170" x2="176" y2="110" stroke="#B5651D" stroke-width="4" opacity="0.8"/><line x1="168" y1="170" x2="198" y2="110" stroke="#B5651D" stroke-width="4" opacity="0.8"/><line x1="190" y1="170" x2="220" y2="110" stroke="#B5651D" stroke-width="4" opacity="0.8"/><line x1="212" y1="170" x2="242" y2="110" stroke="#B5651D" stroke-width="4" opacity="0.8"/><line x1="234" y1="170" x2="264" y2="110" stroke="#B5651D" stroke-width="4" opacity="0.8"/><line x1="256" y1="170" x2="286" y2="110" stroke="#B5651D" stroke-width="4" opacity="0.8"/><line x1="278" y1="170" x2="308" y2="110" stroke="#B5651D" stroke-width="4" opacity="0.8"/><line x1="300" y1="170" x2="330" y2="110" stroke="#B5651D" stroke-width="4" opacity="0.8"/><line x1="322" y1="170" x2="352" y2="110" stroke="#B5651D" stroke-width="4" opacity="0.8"/><line x1="344" y1="170" x2="374" y2="110" stroke="#B5651D" stroke-width="4" opacity="0.8"/><line x1="366" y1="170" x2="396" y2="110" stroke="#B5651D" stroke-width="4" opacity="0.8"/><line x1="388" y1="170" x2="418" y2="110" stroke="#B5651D" stroke-width="4" opacity="0.8"/><line x1="410" y1="170" x2="440" y2="110" stroke="#B5651D" stroke-width="4" opacity="0.8"/><line x1="432" y1="170" x2="462" y2="110" stroke="#B5651D" stroke-width="4" opacity="0.8"/><line x1="454" y1="170" x2="484" y2="110" stroke="#B5651D" stroke-width="4" opacity="0.8"/><line x1="476" y1="170" x2="506" y2="110" stroke="#B5651D" stroke-width="4" opacity="0.8"/><line x1="498" y1="170" x2="528" y2="110" stroke="#B5651D" stroke-width="4" opacity="0.8"/><line x1="520" y1="170" x2="550" y2="110" stroke="#B5651D" stroke-width="4" opacity="0.8"/><rect x="40" y="104" width="42" height="72" fill="#FCFBF8"/><rect x="518" y="104" width="46" height="72" fill="#FCFBF8"/><rect x="80" y="110" width="440" height="60" rx="8" fill="none" stroke="#1B3A5C" stroke-width="2"/><line x1="140" y1="90" x2="280" y2="90" stroke="#1F5C5C" stroke-width="2.5" marker-end="url(#at)"/><text x="210" y="83" font-size="12" fill="#1F5C5C" text-anchor="middle" font-weight="normal">pattern travels this way (fast)</text><path d="M204,198 A16,16 0 1,1 205,200" fill="none" stroke="#666666" stroke-width="1.8" marker-end="url(#ag)"/><path d="M364,198 A16,16 0 1,1 365,200" fill="none" stroke="#666666" stroke-width="1.8" marker-end="url(#ag)"/><text x="300" y="240" font-size="12" fill="#666666" text-anchor="middle" font-weight="normal" font-style="italic">the rope rotates in place (like a barber pole) — the stripes climb forever,</text><text x="300" y="256" font-size="12" fill="#666666" text-anchor="middle" font-weight="normal" font-style="italic">yet the pole never winds up, because each wrap leaving is replaced by one arriving.</text></svg>